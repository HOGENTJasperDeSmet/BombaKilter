<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chilterboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script type="module" src="Javascript/main.js"></script>
  <script type="module" src="Javascript/device.js"></script>
  <link rel="stylesheet" href="main.css">

</head>

<body>
  <div class="app">
    <aside id="nav">
      <div class="filters">
        <div class="header">
          <div>
            <h1>Kilter Board</h1>
            <p id="page-info">Loading</p>
          </div>

          <button id="bluetooth-btn" class="btn-bluetooth-ghost" onclick="setupDevice()">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 7 10 10-5 5V2l5 5L7 17"></path>
            </svg>
          </button>
        </div>
        <div id="download-container" class="download-progress hidden">
          <div class="download-info">
            <span>Downloading</span>
            <span id="download-percent">0%</span>
          </div>
          <div class="download-bar">
            <div id="download-progress-bar" class="progress" style="width: 0%">
            </div>
          </div>
        </div>

        <div class="space-y-3">
          <input type="text" id="filter-name" placeholder="Search routes..."
            class="flex h-9 w-full rounded-md border border-slate-200 bg-slate-50 px-3 py-1 text-sm transition-all focus:bg-white focus:ring-1 focus:ring-slate-950 outline-none">

          <div class="grid grid-cols-2 gap-2">
            <div class="space-y-1">
              <label class="text-[10px] font-bold uppercase text-slate-400">Angle</label>
              <input type="number" id="filter-angle" value="40"
                class="flex h-8 w-full rounded-md border border-slate-200 px-2 text-sm bg-white">
            </div>
            <div class="space-y-1">
              <label class="text-[10px] font-bold uppercase text-slate-400">Grades</label>
              <div class="flex items-center gap-1">
                <select id="filter-diff-min"
                  class="h-8 w-full rounded-md border border-slate-200 text-xs px-1 bg-white">
                  <option value="10">V0</option>
                  <option value="12">V1</option>
                  <option value="14">V2</option>
                  <option value="16">V3</option>
                  <option value="18">V4</option>
                  <option value="20">V5</option>
                  <option value="22">V6</option>
                  <option value="23">V7</option>
                  <option value="24">V8</option>
                  <option value="25">V9</option>
                  <option value="26">V10</option>
                  <option value="27">V11</option>
                  <option value="28">V12</option>
                  <option value="29">V13</option>
                  <option value="30">V14</option>
                  <option value="31">V15</option>
                  <option value="32">V16</option>
                </select>
                <select id="filter-diff-max"
                  class="h-8 w-full rounded-md border border-slate-200 text-xs px-1 bg-white">
                  <option value="11">V0</option>
                  <option value="13">V1</option>
                  <option value="15">V2</option>
                  <option value="17">V3</option>
                  <option value="19">V4</option>
                  <option value="21">V5</option>
                  <option value="22">V6</option>
                  <option value="23">V7</option>
                  <option value="24">V8</option>
                  <option value="25">V9</option>
                  <option value="26">V10</option>
                  <option value="27">V11</option>
                  <option value="28">V12</option>
                  <option value="29">V13</option>
                  <option value="30">V14</option>
                  <option value="31">V15</option>
                  <option value="32" selected>V16</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50" id="climb-list-container">
        <div id="climb-list" class="flex flex-col gap-3">
        </div>
        <div id="infinite-sentinel" class="py-10 flex justify-center">
          <div id="spinner" class=" h-5 w-5 animate-spin rounded-full border-2 border-slate-300 border-t-slate-900">
          </div>
        </div>
      </div>
    </aside>
    <main class="board-container" id="main-board">
      <div class="board-info">
        <button class="text-slate-500 hover:text-slate-900 transition-colors close-btn" onclick="closeRoute()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>
        <div class="flex items-start justify-between mb-2">
          <div>
            <h1 id="route-name" class="text-xl font-bold tracking-tight text-slate-900"></h1>
            <p id="route-setter" class="text-sm text-blue-600 font-medium mb-3"></p>
          </div>
          <div id="route-angle"
            class="px-2 py-1 bg-slate-100 border border-slate-200 rounded text-[10px] font-bold uppercase tracking-wider text-slate-600">
          </div>
        </div>
        <p id="route-description" class="text-sm text-slate-500 leading-relaxed line-clamp-2">
        </p>
      </div>

      <div class="board-image">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1170" id="svg-kb" class="responsive-board">
          <image href="/img/kilterboard-large.svg" height="1170" width="1080"></image>
          <image href="/img/kilterboard-small.svg" height="1170" width="1080"></image>
        </svg>
      </div>

      <div class="board-actions">
      </div>
</body>

</html>

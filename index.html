<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Goat App | Kilter Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="/main.js"></script>

</head>

<body class="bg-slate-50 text-slate-950 antialiased h-screen overflow-hidden">
  <div class="flex flex-col md:flex-row h-screen">

    <aside
      class="w-full md:w-[400px] border-b md:border-b-0 md:border-r border-slate-200 bg-white h-full flex flex-col shadow-sm">

      <div class="p-4 md:p-6 border-b border-slate-100 space-y-4 bg-white/80 backdrop-blur-sm sticky top-0 z-10">
        <div class="flex justify-between items-center md:block">
          <h1 class="text-lg md:text-xl font-bold tracking-tight">Kilter Board</h1>
          <p id="page-info" class="text-[10px] md:text-[11px] text-slate-500 uppercase tracking-wider font-medium mt-1">

          </p>
        </div>

        <div id="download-container" class="mt-2 hidden">
          <div class="flex justify-between text-[9px] uppercase font-bold text-slate-400 mb-1">
            <span>Downloading</span>
            <span id="download-percent">0%</span>
          </div>
          <div class="h-1 w-full bg-slate-100 rounded-full overflow-hidden">
            <div id="download-progress-bar" class="h-full bg-slate-900 transition-all duration-300" style="width: 0%">
            </div>
          </div>
        </div>

        <div class="space-y-3">
          <input type="text" id="filter-name" placeholder="Search routes..."
            class="flex h-9 w-full rounded-md border border-slate-200 bg-slate-50 px-3 py-1 text-sm transition-all focus:bg-white focus:ring-1 focus:ring-slate-950 outline-none">

          <div class="grid grid-cols-2 gap-2">
            <div class="space-y-1">
              <label class="text-[10px] font-bold uppercase text-slate-400">Angle</label>
              <input type="number" id="filter-angle" value="40"
                class="flex h-8 w-full rounded-md border border-slate-200 px-2 text-sm bg-white">
            </div>
            <div class="space-y-1">
              <label class="text-[10px] font-bold uppercase text-slate-400">Grades</label>
              <div class="flex items-center gap-1">
                <select id="filter-diff-min"
                  class="h-8 w-full rounded-md border border-slate-200 text-xs px-1 bg-white">
                  <option value="10">V0</option>
                  <option value="12">V1</option>
                  <option value="14">V2</option>
                  <option value="16">V3</option>
                  <option value="18">V4</option>
                  <option value="20">V5</option>
                  <option value="22">V6</option>
                  <option value="23">V7</option>
                  <option value="24">V8</option>
                  <option value="25">V9</option>
                  <option value="26">V10</option>
                  <option value="27">V11</option>
                  <option value="28">V12</option>
                  <option value="29">V13</option>
                  <option value="30">V14</option>
                  <option value="31">V15</option>
                  <option value="32">V16</option>
                </select>
                <select id="filter-diff-max"
                  class="h-8 w-full rounded-md border border-slate-200 text-xs px-1 bg-white">
                  <option value="11">V0</option>
                  <option value="13">V1</option>
                  <option value="15">V2</option>
                  <option value="17">V3</option>
                  <option value="19">V4</option>
                  <option value="21">V5</option>
                  <option value="22">V6</option>
                  <option value="23">V7</option>
                  <option value="24">V8</option>
                  <option value="25">V9</option>
                  <option value="26">V10</option>
                  <option value="27">V11</option>
                  <option value="28">V12</option>
                  <option value="29">V13</option>
                  <option value="30">V14</option>
                  <option value="31">V15</option>
                  <option value="32" selected>V16</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50" id="climb-list-container">
        <div id="climb-list" class="flex flex-col gap-3">
        </div>
        <div id="infinite-sentinel" class="py-10 flex justify-center">
          <div id="spinner" class=" h-5 w-5 animate-spin rounded-full border-2 border-slate-300 border-t-slate-900">
          </div>
        </div>
      </div>
    </aside>
    <!-- 
    <main class="flex-1 bg-white hidden md:flex flex-col items-center justify-center p-12 relative overflow-hidden">
      <div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none"
        style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 24px 24px;"></div>

      <div class="z-10 text-center">
        <p class="text-slate-400 text-sm italic">Select a route to view details</p>
      </div>
    </main> -->

  </div>
</body>

</html>
